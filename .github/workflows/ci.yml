name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build backend
        # P0-3/P0-4 回归守护：tests/skill-prod-loading.test.ts 通过 dist/ 是否存在判断是否运行
        # #skill-kit 生产解析路径的回归测试，不构建 dist/ 会导致该测试套件被静默跳过。
        run: npm run build

      - name: Run tests
        run: npx vitest run

      - name: Build frontend
        run: cd web && npm ci && npm run build
