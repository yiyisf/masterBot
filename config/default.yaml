server:
  port: ${PORT:3000}
  host: ${HOST:0.0.0.0}

models:
  default: openai
  providers:
    openai:
      type: openai
      baseUrl: ${OPENAI_BASE_URL}
      apiKey: ${OPENAI_API_KEY}
      model: ${OPENAI_MODEL:gpt-4}
      maxTokens: 4096
      embeddingModel: ${EMBEDDING_MODEL:text-embedding-3-small}
      
    anthropic:
      type: anthropic
      baseUrl: ${ANTHROPIC_BASE_URL}
      apiKey: ${ANTHROPIC_API_KEY}
      model: ${ANTHROPIC_MODEL:claude-3-sonnet-20240229}
      maxTokens: 4096

    gemini:
      type: gemini
      baseUrl: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}
      apiKey: ${GEMINI_API_KEY}
      model: ${GEMINI_MODEL:gemini-2.0-flash}
      maxTokens: 8192

    ollama:
      type: ollama
      baseUrl: ${OLLAMA_BASE_URL:http://localhost:11434/v1}
      apiKey: ollama
      model: ${OLLAMA_MODEL:llama3.2}
      maxTokens: 4096

agent:
  maxIterations: 10
  maxContextTokens: 120000

memory:
  shortTerm:
    maxMessages: 50
    maxSessions: 100
    ttlSeconds: 3600
  longTerm:
    enabled: true
    vectorDb: sqlite
    collectionName: cmaster_memory

skills:
  autoLoad: true
  directories:
    - ./skills/built-in
    - ./skills/installed
    - ./skills/local
  shell:
    preferGitBash: true
    sandbox:
      enabled: true
      mode: blocklist

auth:
  enabled: false
  mode: api-key
  apiKeys:
    - ${API_KEY:changeme}
  jwtSecret: ${JWT_SECRET:changeme}

# 细粒度权限控制 (默认关闭，向后兼容)
permissions:
  enabled: false
  rules:
    - skills: ['database-connector', 'shell']
      roles: ['admin', 'developer']
    - skills: ['hr-api', 'hr-portal']
      roles: ['hr', 'admin']

queue:
  redis:
    url: ${REDIS_URL:redis://localhost:6379}
  defaultJobOptions:
    attempts: 3
    backoff:
      type: exponential
      delay: 1000

logging:
  level: ${LOG_LEVEL:info}
  prettyPrint: true

im:
  enabled: false
  platform: feishu
  feishu:
    appId:             ${FEISHU_APP_ID:}
    appSecret:         ${FEISHU_APP_SECRET:}
    verificationToken: ${FEISHU_VERIFY_TOKEN:}
    encryptKey:        ${FEISHU_ENCRYPT_KEY:}
  defaultRole: user
  hitlTimeoutMinutes: 30

audit:
  enabled: true
  retentionDays: 90
