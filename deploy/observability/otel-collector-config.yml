receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  # 转发到 Langfuse OTLP 端点
  # ${env:VAR} 是 OTel Collector contrib 的环境变量展开语法（非 Docker Compose 语法）
  otlphttp/langfuse:
    endpoint: http://langfuse-web:3000/api/public/otel
    headers:
      Authorization: "Basic ${env:LANGFUSE_OTLP_AUTH_HEADER}"
    tls:
      insecure: true

  # 本地调试用
  logging:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/langfuse, logging]
